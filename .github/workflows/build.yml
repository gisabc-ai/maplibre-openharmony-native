name: Build OpenHarmony App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache OpenHarmony SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: /home/runner/oh-sdk
          key: oh-sdk-latest

      - name: Download SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p $HOME/oh-sdk
          echo "=== Downloading OpenHarmony SDK (~2.3GB) ==="
          SDK_URL="https://repo.huaweicloud.com/openharmony/os/4.1.1-Release/ohos-sdk-windows_linux-public.tar.gz"
          curl -L --connect-timeout 60 --max-time 7200 \
            --progress-bar "$SDK_URL" -o /tmp/ohos-sdk.tar.gz
          FILE_SIZE=$(stat -c%s /tmp/ohos-sdk.tar.gz 2>/dev/null || echo 0)
          echo "Downloaded: $FILE_SIZE bytes ($(du -h /tmp/ohos-sdk.tar.gz | cut -f1))"
          if [ "$FILE_SIZE" -lt 1000000 ]; then echo "ERROR: File too small"; exit 1; fi
          tar -xzf /tmp/ohos-sdk.tar.gz -C $HOME/oh-sdk --strip-components=1 2>&1 | tail -3
          ls $HOME/oh-sdk/

      - name: Verify SDK
        run: |
          ls $HOME/oh-sdk/
          ls $HOME/oh-sdk/native/ 2>/dev/null | head -5
          ls $HOME/oh-sdk/toolchains/ 2>/dev/null | head -5

      - name: Install hvigor and dependencies
        env:
          OHOS_SDK_ROOT: /home/runner/oh-sdk
          OHOS_SDK_HOME: /home/runner/oh-sdk
        run: |
          cd phase1_opengl_demo
          
          echo "=== SDK contents ==="
          ls $OHOS_SDK_ROOT/
          ls $OHOS_SDK_ROOT/toolchains/ 2>/dev/null || echo "no toolchains"
          echo ""
          
          # Discover SDK toolchains - check both direct path and linux subdirectory
          echo "=== Discovering SDK toolchains ==="
          if [ -d "$OHOS_SDK_ROOT/toolchains/ohpm" ]; then
            OHPM_DIR="$OHOS_SDK_ROOT/toolchains/ohpm"
          elif [ -d "$OHOS_SDK_ROOT/toolchains/linux/ohpm" ]; then
            OHPM_DIR="$OHOS_SDK_ROOT/toolchains/linux/ohpm"
          else
            # Search for ohpm binary in toolchains
            OHPM_DIR=$(find $OHOS_SDK_ROOT/toolchains -name "ohpm" -type f 2>/dev/null | head -1 | xargs dirname 2>/dev/null || echo "")
          fi
          
          if [ -n "$OHPM_DIR" ] && [ -d "$OHPM_DIR" ]; then
            export PATH="$OHPM_DIR/bin:$PATH"
            echo "Found ohpm at: $OHPM_DIR/bin"
            ls "$OHPM_DIR/bin/" 2>/dev/null | head -10
          else
            echo "ohpm not found in SDK toolchains, checking full toolchains tree..."
            find $OHOS_SDK_ROOT/toolchains -name "ohpm*" -type f 2>/dev/null | head -5
          fi
          
          # Also add node to PATH if available
          if [ -d "$OHOS_SDK_ROOT/toolchains/node" ]; then
            export PATH="$OHOS_SDK_ROOT/toolchains/node/bin:$PATH"
          elif [ -d "$OHOS_SDK_ROOT/toolchains/linux/node" ]; then
            export PATH="$OHOS_SDK_ROOT/toolchains/linux/node/bin:$PATH"
          fi
          echo "node: $(node --version 2>/dev/null || echo 'not found')"
          echo "npm: $(npm --version 2>/dev/null || echo 'not found')"
          echo "ohpm: $(ohpm --version 2>/dev/null || echo 'not found')"
          
          # Install dependencies - prefer ohpm (OpenHarmony package manager)
          if command -v ohpm &>/dev/null; then
            echo "Installing via ohpm..."
            # Configure ohpm registry if needed
            ohpm config set registry https://repo.huaweicloud.com/openharmony/ 2>/dev/null || true
            ohpm install 2>&1 | tail -10
          else
            echo "ohpm not available, trying npm with OpenHarmony registry..."
            # Configure npm for @ohos packages - use OpenHarmony npm registry
            npm config set @ohos:registry https://repo.huaweicloud.com/openharmony/ 2>/dev/null || true
            npm install 2>&1 | tail -10
          fi
          
          echo ""
          echo "=== node_modules bin ==="
          ls node_modules/.bin/ 2>/dev/null | head -15 || echo "no .bin"
          echo ""
          
          echo "=== hvigor wrapper check ==="
          chmod +x hvigor/hvigor
          ./hvigor/hvigor --version 2>&1 || {
            echo "hvigor not in node_modules, trying ohpm install..."
            if command -v ohpm &>/dev/null; then
              ohpm install @ohos/hvigor@4.1.0.200 2>&1 | tail -5
            else
              echo "hvigor not available, npm registry may not have @ohos/hvigor..."
              npm install -g @ohos/hvigor@4.1.0.200 2>&1 | tail -5 || true
            fi
            ./hvigor/hvigor --version 2>&1 || echo "hvigor version FAILED"
          }

      - name: Build HAP
        env:
          OHOS_SDK_ROOT: /home/runner/oh-sdk
          OHOS_SDK_HOME: /home/runner/oh-sdk
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          cd phase1_opengl_demo
          export OHOS_SDK_ROOT=/home/runner/oh-sdk
          export OHOS_SDK_HOME=/home/runner/oh-sdk
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$OHOS_SDK_ROOT/toolchains/node/bin:$PATH
          
          echo "=== Environment ==="
          echo "OHOS_SDK_ROOT: $OHOS_SDK_ROOT"
          echo "JAVA: $(java -version 2>&1 | head -1)"
          echo "NODE: $(node --version)"
          echo "NPM: $(npm --version)"
          echo ""
          
          echo "=== SDK toolchains ==="
          ls $OHOS_SDK_ROOT/toolchains/ 2>/dev/null
          echo ""
          
          echo "=== hvigor wrapper ==="
          chmod +x hvigor/hvigor
          ./hvigor/hvigor --version 2>&1
          echo ""
          
          echo "=== node_modules bin ==="
          ls node_modules/.bin/ 2>/dev/null | head -10
          echo ""
          
          rm -rf entry/build
          
          echo "=== BUILDING HAP ==="
          ./hvigor/hvigor assembleHap \
            --mode module \
            -p product=default \
            -p buildMode=debug \
            -p compileSdkVersion=5 \
            --no-daemon 2>&1 | tee /tmp/build.log
          
          EXIT_CODE=${PIPESTATUS[0]}
          echo "Exit code: $EXIT_CODE"
          tail -50 /tmp/build.log

      - name: Find and Package Outputs
        run: |
          cd phase1_opengl_demo
          echo "=== ALL .hap files ==="
          find . -iname "*.hap" 2>/dev/null
          echo ""
          echo "=== entry/build tree ==="
          find entry/build -type f 2>/dev/null | head -30
          echo ""
          if [ -d entry/build ]; then
            tar -czvf entry-build.tar.gz entry/build 2>&1
            echo "Packaged: $(du -h entry-build.tar.gz | cut -f1)"
          fi

      - name: Upload Build Directory
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: openharmony-build-dir
          path: |
            ${{ github.workspace }}/phase1_opengl_demo/entry-build.tar.gz
            ${{ github.workspace }}/phase1_opengl_demo/**/*.hap
          retention-days: 7
          ignore-no-files: true

      - name: Upload Build Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 7

