name: Build OpenHarmony App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache OpenHarmony SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: /home/runner/oh-sdk
          key: oh-sdk-4.1.1-fixed

      - name: Download SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p $HOME/oh-sdk
          echo "=== Downloading OpenHarmony SDK (~2.3GB) ==="
          SDK_URL="https://repo.huaweicloud.com/openharmony/os/4.1.1-Release/ohos-sdk-windows_linux-public.tar.gz"
          curl -L --connect-timeout 60 --max-time 7200 \
            --progress-bar "$SDK_URL" -o /tmp/ohos-sdk.tar.gz
          FILE_SIZE=$(stat -c%s /tmp/ohos-sdk.tar.gz 2>/dev/null || echo 0)
          echo "Downloaded: $FILE_SIZE bytes ($(du -h /tmp/ohos-sdk.tar.gz | cut -f1))"
          if [ "$FILE_SIZE" -lt 1000000 ]; then echo "ERROR: File too small"; exit 1; fi
          tar -xzf /tmp/ohos-sdk.tar.gz -C $HOME/oh-sdk --strip-components=1 2>&1 | tail -3
          ls $HOME/oh-sdk/

      - name: Verify SDK
        run: |
          ls $HOME/oh-sdk/
          echo "native:" && ls $HOME/oh-sdk/native/ 2>/dev/null | head -5
          echo "build-tools:" && ls $HOME/oh-sdk/build-tools/ 2>/dev/null | head -5

      - name: Install hvigor
        run: |
          cd phase1_opengl_demo
          npm install 2>&1 | tail -5
          npm install -g @ohos/hvigor@4.1.0.200 2>&1 | tail -3

      - name: Build HAP
        env:
          OH_SDK_ROOT: /home/runner/oh-sdk
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          cd phase1_opengl_demo
          export OH_SDK_ROOT=$HOME/oh-sdk
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          
          chmod +x hvigor/hvigor
          
          echo "=== SDK verification ==="
          echo "SDK: $OH_SDK_ROOT"
          echo "java: $(java -version 2>&1 | head -1)"
          echo "ls SDK: $(ls $OH_SDK_ROOT/ | tr '\n' ' ')"
          
          rm -rf entry/build
          
          echo "=== Running hvigor ==="
          ./hvigor/hvigor assembleHap \
            --mode module \
            -p product=default \
            -p buildMode=debug \
            -p compileSdkVersion=4 \
            --no-daemon 2>&1 | tee /tmp/build.log
          
          EXIT_CODE=${PIPESTATUS[0]}
          echo "Hvigor exit code: $EXIT_CODE"
          echo ""
          echo "=== Full build log ==="
          cat /tmp/build.log
          echo ""
          echo "=== Build log (last 100 lines) ==="
          tail -100 /tmp/build.log

      - name: Find and Package Outputs
        run: |
          cd phase1_opengl_demo
          echo "=== Directory structure ==="
          find . -maxdepth 4 -type d 2>/dev/null | head -30
          echo ""
          echo "=== entry/build ==="
          find entry/build -type f 2>/dev/null | head -30
          echo ""
          echo "=== ALL .hap files ==="
          find . -iname "*.hap" 2>/dev/null
          echo ""
          echo "=== ALL .so files ==="
          find . -iname "*.so" 2>/dev/null | head -20
          echo ""
          # Package everything in build as artifact
          if [ -d entry/build ]; then
            echo "=== Packaging entry/build as artifact ==="
            tar -czvf entry-build.tar.gz entry/build 2>&1
            echo "Packaged: $(du -h entry-build.tar.gz | cut -f1)"
          fi

      - name: Upload Build Directory
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: openharmony-build-dir
          path: |
            ${{ github.workspace }}/phase1_opengl_demo/entry-build.tar.gz
            ${{ github.workspace }}/phase1_opengl_demo/entry/build/**/*.hap
            ${{ github.workspace }}/phase1_opengl_demo/**/*.so
          retention-days: 7
          ignore-no-files: true

      - name: Upload Build Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 7
