name: Build OpenHarmony App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ============================================================
      # 下载 OpenHarmony SDK（只用一次，之后有缓存）
      # ============================================================
      - name: Cache OpenHarmony SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/oh-sdk
          key: oh-sdk-4.1.1-fixed

      - name: Download SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p $HOME/oh-sdk
          echo "=== Downloading OpenHarmony SDK (~2.3GB) ==="
          
          SDK_URL="https://repo.huaweicloud.com/openharmony/os/4.1.1-Release/ohos-sdk-windows_linux-public.tar.gz"
          
          curl -L --connect-timeout 60 --max-time 7200 \
            --progress-bar \
            "$SDK_URL" -o /tmp/ohos-sdk.tar.gz
          
          FILE_SIZE=$(stat -c%s /tmp/ohos-sdk.tar.gz 2>/dev/null || echo 0)
          echo "Downloaded: $FILE_SIZE bytes ($(du -h /tmp/ohos-sdk.tar.gz | cut -f1))"
          
          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "ERROR: File too small"
            exit 1
          fi
          
          echo "Extracting..."
          mkdir -p $HOME/oh-sdk
          tar -xzf /tmp/ohos-sdk.tar.gz -C $HOME/oh-sdk --strip-components=1 2>&1 | tail -3
          ls $HOME/oh-sdk/

      - name: Verify SDK
        run: |
          ls $HOME/oh-sdk/
          ls $HOME/oh-sdk/native/ 2>/dev/null | head -5

      - name: Install hvigor
        run: |
          cd phase1_opengl_demo
          npm install 2>&1 | tail -5
          npm install -g @ohos/hvigor@4.1.0.200 2>&1 | tail -3

      - name: Build HAP
        env:
          OH_SDK_ROOT: /home/runner/oh-sdk
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          cd phase1_opengl_demo
          export OH_SDK_ROOT=$HOME/oh-sdk
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$OH_SDK_ROOT/native/build-tools/latest/ohos-sClang64/bin:$PATH
          
          echo "SDK: $OH_SDK_ROOT"
          echo "java: $(java -version 2>&1 | head -1)"
          
          chmod +x hvigor/hvigor
          
          echo "=== SDK structure ==="
          ls $OH_SDK_ROOT/
          ls $OH_SDK_ROOT/build/cmake/ 2>/dev/null | head -5
          
          rm -rf entry/build
          
          ./hvigor/hvigor assembleHap \
            --mode module \
            -p product=default \
            -p buildMode=debug \
            -p compileSdkVersion=4 \
            --no-daemon 2>&1 | tee /tmp/build.log
          
          echo "Exit: $?"
          tail -30 /tmp/build.log

      - name: Find outputs
        run: |
          echo "=== Current directory ==="
          pwd && ls -la
          echo ""
          echo "=== entry/build ==="
          find entry/build -type f 2>/dev/null | head -30
          echo ""
          echo "=== ALL .hap/.HAP files ==="
          find . -iname "*.hap" 2>/dev/null | head -20
          echo ""
          echo "=== ALL build output dirs ==="
          find . -path "*/build/outputs/*" -type f 2>/dev/null | head -20
          echo ""
          echo "=== entry/build/default/outputs/default ==="
          ls -laR entry/build/default/outputs/default/ 2>/dev/null || echo "Dir not found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: openharmony-hap
          path: |
            ${{ github.workspace }}/phase1_opengl_demo/entry/build/default/outputs/default/*.hap
            ${{ github.workspace }}/**/*.hap
            ${{ github.workspace }}/**/entry-default*.hap
          retention-days: 7
          ignore-no-files: true
